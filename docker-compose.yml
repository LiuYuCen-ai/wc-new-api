# New-API Docker Compose Configuration
#
# Local checkout (bundles YOUR current frontend + Go binary — recommended):
#   docker compose up -d --build
#   First build can take several minutes (bun + rsbuild + go).
#   http://localhost:3000
#
# Use existing image without rebuilding:
#   docker compose up -d
#
# Start from a local image tar (e.g. new-api.tar):
#   docker load -i new-api.tar
#   docker images   # note REPOSITORY:TAG; if not new-api:local, run:
#   docker tag <that-repo:tag> new-api:local
#   docker compose -f docker-compose.yml -f docker-compose.from-tar.yml up -d
#
# This stack defaults to MySQL. To use PostgreSQL instead:
#   1. Swap SQL_DSN: use postgresql://... and comment the MySQL DSN
#   2. In depends_on, use postgres instead of mysql
#   3. Comment the mysql service; uncomment postgres
#   4. Use pg_data volume; comment mysql_data
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:local
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
#      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api # PostgreSQL (uncomment postgres service + depends_on below)
      - SQL_DSN=root:123456@tcp(mysql:3306)/new-api # ⚠️ IMPORTANT: Change the password in production!
      - REDIS_CONN_STRING=redis://:123456@redis:6379 # ⚠️ IMPORTANT: Change the password in production!
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=new-api-node-1  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设置 (Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！！ （multi-node deployment, set this to a random string!!!!!!!）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - mysql
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]  # ⚠️ IMPORTANT: Change this password in production!
    networks:
      - new-api-network

#  postgres:
#    image: postgres:15
#    container_name: postgres
#    restart: always
#    environment:
#      POSTGRES_USER: root
#      POSTGRES_PASSWORD: 123456
#      POSTGRES_DB: new-api
#    volumes:
#      - pg_data:/var/lib/postgresql/data
#    networks:
#      - new-api-network

  mysql:
    image: mysql:8.0.34
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456  # ⚠️ IMPORTANT: Change this password in production!
      MYSQL_DATABASE: new-api
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - new-api-network
    command:
      [
        '--character-set-server=utf8mb4',
        '--collation-server=utf8mb4_unicode_ci',
      ]
#    ports:
#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker

volumes:
#  pg_data:
  mysql_data:

networks:
  new-api-network:
    driver: bridge